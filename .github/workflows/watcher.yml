name: news-watcher
on:
  # Scheduled polling disabled 2026-06-21 to stop recurring GitHub Actions cost.
  # Re-enable by uncommenting the cron below (watcher.py re-gates to 07:00-22:00 Europe/London).
  # schedule:
  #   - cron: "7,37 6-21 * * *"   # UTC, off the congested :00/:30 (GitHub skips those under load)
  workflow_dispatch: {}
permissions:
  contents: read
concurrency:
  group: news-watcher
jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Restore watcher state
        uses: actions/cache/restore@v4
        with:
          path: automation/state
          key: watcher-state-${{ github.run_id }}
          restore-keys: watcher-state-
      - name: Run watcher
        env:
          REPO_DISPATCH_PAT: ${{ secrets.REPO_DISPATCH_PAT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python automation/watcher.py
      - name: Save watcher state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: automation/state
          key: watcher-state-${{ github.run_id }}
      - name: Alert on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python automation/telegram_bot.py alert \
            "Watcher run crashed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
